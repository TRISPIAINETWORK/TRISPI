version: '3.9'

# TRISPI Blockchain — Full Node Stack
#
# Запуск нового нода (подключение к сети):
#   export TRISPI_BOOTSTRAP=https://trispi-mainnet.replit.app
#   docker compose up -d
#
# Посмотреть логи:
#   docker compose logs -f
#
# Остановить:
#   docker compose down
#
# Полный сброс (с удалением данных):
#   docker compose down -v

services:

  # ── PostgreSQL — хранилище состояния ──────────────────────────────────────────
  trispi-db:
    image: postgres:16-alpine
    container_name: trispi-db
    environment:
      POSTGRES_DB:       trispi
      POSTGRES_USER:     trispi
      POSTGRES_PASSWORD: "${DB_PASSWORD:-trispi_dev_secret}"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - trispi-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trispi -d trispi"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Rust Core — EVM + WASM + Post-Quantum криптография ────────────────────────
  trispi-rust:
    build:
      context: ./rust-core
      dockerfile: Dockerfile.rust
    container_name: trispi-rust
    ports:
      - "6000:6000"
    environment:
      RUST_LOG: info
      PORT: 6000
    volumes:
      - rust-data:/app/data
    networks:
      - trispi-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/6000' 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Go Consensus — PBFT + libp2p P2P ──────────────────────────────────────────
  trispi-go:
    build:
      context: ./go-consensus
      dockerfile: Dockerfile
    container_name: trispi-go
    ports:
      - "8181:8181"   # HTTP API
      - "50051:50051" # P2P TCP (legacy)
      - "50052:50052" # libp2p (required open for peering)
    environment:
      RUST_CORE_URL:      http://trispi-rust:6000
      BLOCK_MINED_SECRET: "${BLOCK_MINED_SECRET:-trispi-internal-block-secret}"
      # Bootstrap peer — peer адрес genesis нода, через который синхронизируется цепочка
      # Формат: /dns4/<host>/tcp/50052/p2p/<peer-id>
      BOOTSTRAP_PEER:     "${TRISPI_BOOTSTRAP_PEER:-}"
      NODE_ID:            "${NODE_ID:-node2}"
    volumes:
      - consensus-data:/app/data
    depends_on:
      trispi-rust:
        condition: service_healthy
    networks:
      - trispi-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Python AI Service — API + PoI + AI Консенсус ──────────────────────────────
  trispi-python:
    build:
      context: ./python-ai-service
      dockerfile: Dockerfile.python
    container_name: trispi-python
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:       "postgresql://trispi:${DB_PASSWORD:-trispi_dev_secret}@trispi-db:5432/trispi"
      RUST_CORE_URL:      http://trispi-rust:6000
      GO_CONSENSUS_URL:   http://trispi-go:8181
      BLOCK_MINED_SECRET: "${BLOCK_MINED_SECRET:-trispi-internal-block-secret}"
      GOVERNANCE_SECRET:  "${GOVERNANCE_SECRET:-}"
      CHAIN_ID:           "7878"
      # URL основного (genesis) нода — используется для chain sync при первом запуске
      TRISPI_BOOTSTRAP:   "${TRISPI_BOOTSTRAP:-}"
      PYTHONUNBUFFERED:   "1"
    volumes:
      - python-data:/app/trispi_state
      - node-secrets:/app/secrets
    depends_on:
      trispi-db:
        condition: service_healthy
      trispi-go:
        condition: service_healthy
    networks:
      - trispi-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Frontend — React dApp ──────────────────────────────────────────────────────
  trispi-dapp:
    image: node:20-alpine
    container_name: trispi-dapp
    working_dir: /app
    volumes:
      - ./frontend/dist:/app/frontend/dist:ro
      - ./serve_frontend.js:/app/serve_frontend.js:ro
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
    command: node serve_frontend.js
    depends_on:
      trispi-python:
        condition: service_healthy
    networks:
      - trispi-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ | grep -q html || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Nginx — reverse proxy (включается только в production профиле) ─────────────
  trispi-nginx:
    image: nginx:alpine
    container_name: trispi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - trispi-dapp
      - trispi-python
    networks:
      - trispi-net
    restart: unless-stopped
    profiles:
      - production

networks:
  trispi-net:
    driver: bridge

volumes:
  db-data:
  rust-data:
  consensus-data:
  python-data:
  node-secrets:
  nginx-certs:
