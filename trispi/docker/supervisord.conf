[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
logfile_maxbytes=20MB
logfile_backups=5
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# ── [1] Go Consensus Node ─────────────────────────────────────────────────────
[program:go-consensus]
command=/app/go-consensus/trispi-consensus
    -id %(ENV_NODE_ID)s
    -http %(ENV_GO_PORT)s
    -port 50052
    -chain /app/data/chain/trispi_chain.json
    -bootstrap %(ENV_TRISPI_BOOTSTRAP)s
directory=/app/go-consensus
autostart=true
autorestart=true
startsecs=3
startretries=10
priority=10
stdout_logfile=/var/log/supervisor/go-consensus.log
stderr_logfile=/var/log/supervisor/go-consensus.err
environment=BLOCK_MINED_SECRET="%(ENV_BLOCK_MINED_SECRET)s"

# ── [2] Rust Core (EVM + WASM + PQC bridge) ───────────────────────────────────
[program:rust-core]
command=/app/rust-core/trispi-core --port %(ENV_RUST_PORT)s
directory=/app/rust-core
autostart=true
autorestart=true
startsecs=5
startretries=5
priority=20
stdout_logfile=/var/log/supervisor/rust-core.log
stderr_logfile=/var/log/supervisor/rust-core.err

# ── [3] Python AI Service (fast gateway + full AI on :8001) ───────────────────
[program:python-ai]
command=uvicorn app.main_fast:app --host 0.0.0.0 --port %(ENV_PYTHON_PORT)s --workers 1
directory=/app/python-ai-service
autostart=true
autorestart=true
startsecs=10
startretries=5
priority=30
stdout_logfile=/var/log/supervisor/python-ai.log
stderr_logfile=/var/log/supervisor/python-ai.err
environment=
    BLOCK_MINED_SECRET="%(ENV_BLOCK_MINED_SECRET)s",
    TRISPI_BOOTSTRAP="%(ENV_TRISPI_BOOTSTRAP)s",
    PYTHONPATH="/app/python-ai-service",
    PYTHONUNBUFFERED="1"

# ── [4] Frontend static server ────────────────────────────────────────────────
[program:frontend]
command=node /app/serve_frontend.js
directory=/app
autostart=true
autorestart=true
startsecs=2
startretries=5
priority=40
stdout_logfile=/var/log/supervisor/frontend.log
stderr_logfile=/var/log/supervisor/frontend.err
environment=PORT="%(ENV_PORT)s"
